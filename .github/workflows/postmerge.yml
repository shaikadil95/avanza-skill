name: Post-merge

on:
  push:
    branches: [main, master]

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required to push tags and create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed so the tag action can read all commits

      # Derives next semver from conventional commit messages since the last tag:
      #   fix:      → patch bump  (v1.2.3 → v1.2.4)
      #   feat:     → minor bump  (v1.2.3 → v1.3.0)
      #   feat!: or BREAKING CHANGE footer → major bump  (v1.2.3 → v2.0.0)
      # Falls back to patch when no conventional commit prefix is detected.
      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch
          release_branches: main,master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
